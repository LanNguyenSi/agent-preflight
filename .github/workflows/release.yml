name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit --skipLibCheck
      - run: npx vitest run
      - run: ./scripts/create-release-bundle.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            out/release/*.tar.gz
            out/release/*.sha256
